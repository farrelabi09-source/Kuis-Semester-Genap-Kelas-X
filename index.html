<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✏️📗📘 Kuis Semester Genap Kelas X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }, colors: { teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' } } } } }
    </script>
    <style>
        :root { --bg-main: #f0f9ff; --text-main: #0f172a; --glass-bg: rgba(255, 255, 255, 0.85); --glass-border: rgba(148, 163, 184, 0.2); --nav-bg: rgba(241, 245, 249, 0.8); }
        .dark { --bg-main: #0f172a; --text-main: #f8fafc; --glass-bg: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.08); --nav-bg: rgba(15, 23, 42, 0.6); }
        body { background-color: var(--bg-main); color: var(--text-main); background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 30%), radial-gradient(circle at 85% 30%, rgba(45, 212, 191, 0.15), transparent 30%); background-attachment: fixed; min-height: 100dvh; transition: background-color 0.5s ease; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .subject-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .subject-card:hover { transform: translateY(-5px); background: rgba(45, 212, 191, 0.1); }
        .dynamic-island { transition: width 0.4s ease-in-out, border-radius 0.4s ease-in-out; height: 48px; overflow: hidden; display: flex; align-items: center; white-space: nowrap; }
        .di-collapsed { width: 48px; border-radius: 24px; cursor: pointer; }
        .di-expanded { width: clamp(230px, calc(100vw - 130px), 380px); border-radius: 24px; }
        .cinematic-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: 0.03em; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #login-screen { backdrop-filter: blur(20px); z-index: 100; display: flex; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #2dd4bf; object-fit: cover; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #3b82f6; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-2 md:p-8 flex flex-col items-center justify-center pt-20 md:pt-10" data-text-size="md">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-slate-900/80 transition-all duration-500">
        <div class="glass-panel p-8 rounded-3xl max-w-sm w-[90%] text-center fade-in">
            <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i class="ph-fill ph-cloud-arrow-up text-5xl text-blue-400"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 cinematic-title dark:text-white">Cloud Sync</h2>
            <p class="text-slate-400 text-sm mb-8">Masuk dengan akun Google untuk menyinkronkan skor kuis antar perangkat secara otomatis.</p>
            <button id="btn-google-login" class="w-full py-4 bg-white text-slate-900 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-slate-100 transition-all active:scale-95 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                <span id="login-btn-text">Masuk dengan Google</span>
            </button>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-[100] overflow-hidden hidden"></div>

    <div id="dynamic-island" class="fixed top-3 left-3 md:top-6 md:left-8 z-[70] bg-white/80 dark:bg-slate-800/90 backdrop-blur-xl border border-white/20 shadow-lg dynamic-island di-collapsed" onclick="togglePlayerState(event)">
        <div id="music-icon-container" class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-500/20 text-red-500 flex items-center justify-center absolute left-1 top-1 z-20">
            <i id="music-state-icon" class="ph-fill ph-speaker-slash text-xl"></i>
        </div>
        <div id="di-content" class="di-content-wrapper pl-[3.25rem] pr-2 opacity-0 invisible flex items-center">
            <div class="flex-1 min-w-0">
                <div class="truncate text-[12px] font-bold dark:text-white" id="track-title">Lofi Production</div>
                <input type="range" id="track-progress" value="0" max="100" class="w-full h-1 mt-1" onclick="event.stopPropagation()">
            </div>
            <div class="flex items-center gap-2 ml-3" onclick="event.stopPropagation()">
                <button onclick="togglePlay()" class="text-teal-500"><i class="ph-fill ph-play text-2xl" id="play-icon"></i></button>
            </div>
        </div>
    </div>

    <div class="fixed top-3 right-3 md:top-6 md:right-8 z-50 flex flex-col gap-2 items-end">
        <div class="flex gap-2 items-center">
            <div id="user-info" class="hidden glass-panel px-3 py-1.5 rounded-full flex items-center gap-2 border-teal-500/30 shadow-lg">
                <img id="user-photo" class="user-avatar" src="" alt="">
                <span id="user-name" class="text-[10px] font-bold cinematic-title hidden md:block dark:text-white">User</span>
                <button onclick="handleLogout()" class="text-red-400 ml-1"><i class="ph-bold ph-sign-out text-lg"></i></button>
            </div>
            <button onclick="openSettings()" class="w-10 h-10 md:w-12 md:h-12 rounded-full glass-panel flex items-center justify-center shadow-lg"><i class="ph-fill ph-gear text-xl text-slate-300"></i></button>
            <button onclick="toggleTheme()" class="w-10 h-10 md:w-12 md:h-12 rounded-full glass-panel flex items-center justify-center shadow-lg"><i id="theme-icon" class="ph-fill ph-moon text-xl text-teal-400"></i></button>
        </div>
    </div>

    <div id="screen-home" class="w-full max-w-5xl fade-in hidden px-2">
        <div class="text-center mb-8 mt-12">
            <h1 class="text-3xl md:text-5xl mb-3 bg-clip-text text-transparent bg-gradient-to-r from-blue-500 via-teal-400 to-emerald-400 cinematic-title">Kuis Semester Genap</h1>
            <p class="text-slate-400 text-sm">Pilih mata pelajaran untuk sinkronisasi skor otomatis.</p>
        </div>
        <div class="flex flex-wrap justify-center gap-6 w-full" id="subject-grid"></div>
    </div>

    <div id="screen-quiz" class="w-full max-w-4xl fade-in hidden px-1">
        <div class="glass-panel rounded-2xl p-6 md:p-12 text-center">
            <h2 id="quiz-subject-title" class="text-3xl font-bold cinematic-title text-teal-400 mb-6">MAPEL</h2>
            <div id="question-text" class="text-xl mb-8 font-medium dark:text-white"></div>
            <div id="options-container" class="flex flex-col gap-4 max-w-md mx-auto"></div>
            <div class="mt-12 flex justify-between">
                <button onclick="backToMenu()" class="text-slate-400 font-bold">KELUAR</button>
                <div id="timer-display" class="font-mono font-bold text-teal-500"></div>
            </div>
        </div>
    </div>

    <div id="screen-result" class="w-full max-w-2xl fade-in hidden text-center px-4">
        <div class="glass-panel p-12 rounded-3xl">
            <h2 class="text-4xl mb-6 cinematic-title dark:text-white text-slate-800">Skor Kamu</h2>
            <div class="text-7xl font-black text-teal-400 mb-8" id="final-score">0</div>
            <button onclick="backToMenu()" class="px-12 py-4 rounded-xl bg-slate-700 text-white font-bold">Selesai & Simpan</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPeZ0rPMStVHpBX8D0MMBJ2437b_wsFF4",
            authDomain: "kuis-semester-genap-kelas-x.firebaseapp.com",
            projectId: "kuis-semester-genap-kelas-x",
            storageBucket: "kuis-semester-genap-kelas-x.firebasestorage.app",
            messagingSenderId: "673557856475",
            appId: "1:673557856475:web:a4eb9521a4571ccb6c0cfe"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.currentUser = null;
        window.userScores = {};

        // LOGIN
        document.getElementById('btn-google-login').onclick = async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alert(e.message); }
        };

        // LOGOUT
        window.handleLogout = () => signOut(auth);

        // SAVE SCORE
        window.saveScoreToCloud = async (sid, score) => {
            if(!window.currentUser) return;
            const currentHS = window.userScores[sid] || 0;
            if(score > currentHS) {
                window.userScores[sid] = score;
                await setDoc(doc(db, "users", window.currentUser.uid, "scores", sid), { score: score, date: new Date() });
            }
        };

        // AUTH MONITOR
        onAuthStateChanged(auth, async (user) => {
            const loginScr = document.getElementById('login-screen');
            const homeScr = document.getElementById('screen-home');
            if (user) {
                window.currentUser = user;
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
                document.getElementById('user-photo').src = user.photoURL;
                
                // Fetch Scores from Cloud
                const snap = await getDocs(collection(db, "users", user.uid, "scores"));
                window.userScores = {};
                snap.forEach(d => { 
                    window.userScores[d.id] = d.data().score;
                    localStorage.setItem('hs_'+d.id, d.data().score); // Sync to local
                });

                loginScr.style.opacity = '0';
                setTimeout(() => { loginScr.style.display = 'none'; homeScr.classList.remove('hidden'); renderHome(); }, 500);
            } else {
                window.currentUser = null;
                loginScr.style.display = 'flex';
                loginScr.style.opacity = '1';
                homeScr.classList.add('hidden');
                document.getElementById('user-info').classList.add('hidden');
            }
        });
    </script>

    <script>
        const subjects = []; const quizData = {};
        function shuffleArray(a) { let s=[...a]; for(let i=s.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [s[i],s[j]]=[s[j],s[i]]; } return s; }
        
        function renderHome() {
            const grid = document.getElementById('subject-grid'); grid.innerHTML = '';
            subjects.forEach(sub => {
                const hs = localStorage.getItem('hs_'+sub.id) || 0;
                const card = document.createElement('div');
                card.className = 'glass-panel p-6 rounded-2xl subject-card flex flex-col items-center text-center max-w-sm w-full relative';
                card.onclick = () => startQuiz(sub.id);
                card.innerHTML = `
                    <div class="w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center mb-4 relative">
                        <i class="ph ${sub.icon} text-4xl ${sub.color}"></i>
                        ${hs > 0 ? `<div class="absolute -top-2 -right-2 bg-yellow-400 text-yellow-950 text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm border border-yellow-200">⭐ ${hs}</div>` : ''}
                    </div>
                    <h3 class="font-bold text-lg cinematic-title dark:text-white">${sub.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        let curSub, curQs, curIdx=0, ans={}, timer;
        function startQuiz(id) {
            curSub = subjects.find(s=>s.id===id); curQs = shuffleArray(quizData[id]);
            curIdx=0; ans={}; switchScreen('screen-quiz'); renderQuestion();
        }

        function renderQuestion() {
            const q = curQs[curIdx];
            document.getElementById('quiz-subject-title').innerText = curSub.name;
            document.getElementById('question-text').innerHTML = q.question;
            const cont = document.getElementById('options-container'); cont.innerHTML = '';
            q.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 rounded-xl border border-white/10 bg-white/5 text-left dark:text-slate-200";
                b.innerText = o;
                b.onclick = () => { ans[curIdx] = i; if(curIdx < curQs.length-1){ curIdx++; renderQuestion(); } else { finishQuiz(); } };
                cont.appendChild(b);
            });
        }

        function finishQuiz() {
            let correct = 0; curQs.forEach((q, i) => { if(ans[i] === q.answer) correct++; });
            const score = Math.round((correct / curQs.length) * 100);
            document.getElementById('final-score').innerText = score;
            if(window.saveScoreToCloud) window.saveScoreToCloud(curSub.id, score);
            switchScreen('screen-result');
        }

        function switchScreen(s) { ['screen-home','screen-quiz','screen-result'].forEach(i => document.getElementById(i).classList.toggle('hidden', i!==s)); }
        function backToMenu() { switchScreen('screen-home'); renderHome(); }
        function togglePlayerState() { document.getElementById('dynamic-island').classList.toggle('di-collapsed'); document.getElementById('dynamic-island').classList.toggle('di-expanded'); document.getElementById('di-content').classList.toggle('invisible'); document.getElementById('di-content').classList.toggle('opacity-0'); }
        function openSettings(){} function toggleTheme(){} function openAnnouncement(){}
    </script>

    <script src="BahasaInggris.js"></script>
    <script src="PJOK.js"></script>
    <script src="PendidikanPancasila.js"></script>
    <script src="Ekonomi.js"></script>
    <script src="Kimia.js"></script>
</body>
</html>
